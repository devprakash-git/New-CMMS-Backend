<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f4; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background-color: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background-color: #28a745; color: white; border: none; padding: 10px 20px; text-transform: uppercase; border-radius: 4px; cursor: pointer; width: 100%; }
        button:hover { background-color: #218838; }
        .error { color: #dc3545; font-size: 0.9em; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Reset Password</h2>
    {% if validlink %}
        <p>Please enter your new password below:</p>
        {% if error %}
            <div class="error">{{ error }}</div>
        {% endif %}
        <form method="post" action="{% url 'reset-password' uidb64 form_token|default:token %}">
            {% csrf_token %}
            <input type="password" name="new_password" placeholder="New Password" required minlength="8">
            <input type="password" name="confirm_password" placeholder="Confirm New Password" required minlength="8">
            <button type="submit">Change Password</button>
        </form>
    {% else %}
        <p class="error">The password reset link was invalid, possibly because it has already been used. Please request a new password reset.</p>
    {% endif %}
</div>

</body>
</html>
